<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sell - E-AXLE</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="nav">
      <a class="logo" href="index.html">E-AXLE</a>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="sell.html">Sell</a>
        <a href="about.html">About</a>
        <a href="faq.html">FAQ</a>
        <a href="contact.html">Contact</a>
      </nav>
      <div class="nav-actions">
        <input class="nav-search" type="search" placeholder="Search products...">
        <a class="cart-link" href="cart.html">Cart (<span id="cartCount">0</span>)</a>
        <a class="account-link" href="account.html">Account</a>
      </div>
    </div>
    <p class="tag">List an item to sell</p>
  </header>

  <main class="container">
    <section class="products">
      <h2>Sell Your Product</h2>
      <p>To sell an item, describe it below (this is a demo placeholder).</p>
      <form>
        <input placeholder="Product name" style="width:100%;padding:8px;margin:8px 0;border-radius:6px;border:1px solid #ddd">
        <textarea placeholder="Description" style="width:100%;min-height:120px;padding:8px;border-radius:6px;border:1px solid #ddd"></textarea>
        <div style="margin-top:8px"><button class="btn primary">Submit Listing</button></div>
      </form>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
