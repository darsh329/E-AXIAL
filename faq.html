<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FAQ - E-AXLE</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="nav">
      <a class="logo" href="index.html">E-AXLE</a>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="sell.html">Sell</a>
        <a href="about.html">About</a>
        <a href="faq.html">FAQ</a>
        <a href="contact.html">Contact</a>
      </nav>
      <div class="nav-actions">
        <input class="nav-search" type="search" placeholder="Search products...">
        <a class="cart-link" href="cart.html">Cart (<span id="cartCount">0</span>)</a>
        <a class="account-link" href="account.html">Account</a>
      </div>
    </div>
    <p class="tag">Frequently asked questions</p>
  </header>

  <main class="container">
    <section class="products">
      <h2>FAQ</h2>
      <div id="qaList">
        <p>Q: How do I place an order? A: Add products to cart then schedule delivery using Place Order.</p>
      </div>
      <h3>Ask a Question</h3>
      <form id="qaForm">
        <textarea id="questionInput" placeholder="Your question" required style="width:100%;padding:8px;margin:6px 0;border-radius:6px;border:1px solid #ddd"></textarea>
        <textarea id="answerInput" placeholder="Your answer" required style="width:100%;padding:8px;margin:6px 0;border-radius:6px;border:1px solid #ddd"></textarea>
        <button class="btn primary" type="submit">Add Q&A</button>
      </form>
    </section>
  </main>

  <script src="app.js"></script>
  <script>
    const qaForm = document.getElementById('qaForm');
    const qaList = document.getElementById('qaList');
    if(qaForm && qaList){
      qaForm.addEventListener('submit', e=>{
        e.preventDefault();
        const q = document.getElementById('questionInput').value.trim();
        const a = document.getElementById('answerInput').value.trim();
        if(q && a){
          const p = document.createElement('p');
          p.textContent = `Q: ${q} A: ${a}`;
          qaList.appendChild(p);
          qaForm.reset();
        }
      });
    }
  </script>
</body>
</html>
